set timeout=0
set default=0

# ---------------------------------------------------------------------------
# 手动分辨率：只改下一行 set gfxpayload= 即可（保存后重新 cmake --build 生成 ISO）。
# 格式：宽x高x色深，色深一般为 32。
# 常用：800x600x32  1024x768x32  1280x720x32  1920x1080x32
# 交给 GRUB 自动选：auto
# 仅 VGA 文本（无 LFB，最稳）：text
# 若固件报 no suitable video mode，先试更小分辨率或 text。
# （Multiboot2 头里 framebuffer 为 0×0×0，实际模式以本行与 GRUB 为准。）
# ---------------------------------------------------------------------------

menuentry "ChaserOS" {
    set gfxpayload=1024x768x32
    multiboot2 /boot/kernel.elf
    # 可选：放置 iso/boot/font.ttf 或 font.otf 后取消下行注释（需内核编译启用 stb_truetype，见 kernel/third_party/README.txt）
    # module /boot/font.ttf
    boot
}
