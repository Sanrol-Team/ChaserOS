# 推送 v* tag：从源码构建 x86_64-elf 工具链，再构建 ISO 并发布 Release

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build deps + GRUB/xorriso
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bison \
            flex \
            texinfo \
            curl \
            xz-utils \
            cmake \
            make \
            nasm \
            xorriso \
            grub-common \
            grub-pc-bin

      - name: Cache x86_64-elf toolchain
        uses: actions/cache@v4
        id: cache-cross
        with:
          path: .cross
          key: toolchain-${{ runner.os }}-bu2.42-gcc14.2-${{ hashFiles('scripts/build-x86_64-elf-toolchain.sh') }}

      - name: Build x86_64-elf toolchain (binutils + gcc from source)
        run: bash scripts/build-x86_64-elf-toolchain.sh "${GITHUB_WORKSPACE}/.cross"

      - name: Use toolchain on PATH
        run: echo "${GITHUB_WORKSPACE}/.cross/bin" >> "$GITHUB_PATH"

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-elf.cmake
          cmake --build build --target cnos_iso -j"$(nproc)"

      - name: Rename assets (tag in filename)
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp build/cnos.iso "cnos-${TAG}.iso"
          cp build/kernel.elf "kernel-${TAG}.elf"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CNOS ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            cnos-${{ github.ref_name }}.iso
            kernel-${{ github.ref_name }}.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
