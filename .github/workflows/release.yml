# 推送 v* tag：从 GNU 源码构建 x86_64-elf 工具链（Noble 无 apt 交叉包），再构建 ISO 并发布 Release

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-24.04 默认源里没有 gcc-x86-64-elf / binutils-x86-64-elf，勿用 apt 装交叉链
      - name: Install host build deps + GRUB/xorriso
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex texinfo curl xz-utils wget patch cmake make nasm \
            xorriso grub-common grub-pc-bin

      - name: Cache x86_64-elf toolchain
        uses: actions/cache@v5
        id: cache-cross
        with:
          path: .cross
          key: toolchain-${{ runner.os }}-bu2.42-gcc14.2-${{ hashFiles('scripts/build-anaf-cross-toolchain.sh', 'scripts/build-x86_64-elf-toolchain.sh') }}

      - name: Build x86_64-elf toolchain (binutils + gcc from source)
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cross
          bash scripts/build-x86_64-elf-toolchain.sh "${GITHUB_WORKSPACE}/.cross"

      - name: Add toolchain to PATH
        run: echo "${GITHUB_WORKSPACE}/.cross/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          x86_64-elf-gcc --version
          x86_64-elf-ld --version

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-elf.cmake
          cmake --build build --target chaseros_iso -j"$(nproc)"

      - name: Rename assets (tag in filename)
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp build/chaseros.iso "chaseros-${TAG}.iso"
          cp build/kernel.elf "kernel-${TAG}.elf"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ChaserOS ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            chaseros-${{ github.ref_name }}.iso
            kernel-${{ github.ref_name }}.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
