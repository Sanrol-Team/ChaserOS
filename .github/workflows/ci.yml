name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex texinfo curl xz-utils cmake make nasm \
            xorriso grub-common grub-pc-bin libgmp-dev libmpfr-dev libmpc-dev

      - name: Cache x86_64-elf toolchain
        uses: actions/cache@v4
        id: cache-cross
        with:
          path: .cross
          # 建议增加版本号在 key 里，方便手动强制刷新缓存
          key: toolchain-${{ runner.os }}-bu2.42-gcc14.2-${{ hashFiles('scripts/build-x86_64-elf-toolchain.sh') }}

      - name: Build x86_64-elf toolchain
        # 只有在缓存没命中时才执行编译
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cross
          bash scripts/build-x86_64-elf-toolchain.sh "${GITHUB_WORKSPACE}/.cross"

      - name: Add toolchain to PATH
        run: echo "${GITHUB_WORKSPACE}/.cross/bin" >> "$GITHUB_PATH"

      - name: Verify Toolchain
        run: |
          x86_64-elf-gcc --version
          x86_64-elf-ld --version

      - name: Configure (CMake)
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-elf.cmake

      - name: Build kernel.elf
        run: cmake --build build --target kernel.elf -j"$(nproc)"

      - name: Build cnos.iso
        run: cmake --build build --target cnos_iso -j"$(nproc)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cnos-build-${{ github.sha }}
          path: |
            build/kernel.elf
            build/cnos.iso
          if-no-files-found: error