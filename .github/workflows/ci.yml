name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 支持在 GitHub Action 页面手动点击运行

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bison \
            flex \
            texinfo \
            curl \
            xz-utils \
            wget \
            patch \
            cmake \
            make \
            nasm \
            xorriso \
            grub-common \
            grub-pc-bin \
            bzip2 \
            mtools \
            libisoburn1 \
            libisofs6

      - name: Cache x86_64-elf toolchain
        uses: actions/cache@v5
        id: cache-cross
        with:
          path: .cross
          # 通过 hashFiles 绑定脚本内容，脚本一改缓存自动失效
          key: toolchain-${{ runner.os }}-gcc14.2-${{ hashFiles('scripts/build-anaf-cross-toolchain.sh', 'scripts/build-x86_64-elf-toolchain.sh') }}
          restore-keys: |
            toolchain-${{ runner.os }}-gcc14.2-

      - name: Build x86_64-elf toolchain
        if: steps.cache-cross.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/build-anaf-cross-toolchain.sh scripts/build-x86_64-elf-toolchain.sh
          mkdir -p .cross
          bash scripts/build-x86_64-elf-toolchain.sh "${GITHUB_WORKSPACE}/.cross"

      - name: Add toolchain to PATH
        # 无论是否有缓存命中，都必须重新向 $GITHUB_PATH 写入路径
        run: echo "${GITHUB_WORKSPACE}/.cross/bin" >> "$GITHUB_PATH"

      - name: Verify Toolchain
        run: |
          x86_64-elf-gcc --version
          x86_64-elf-ld --version

      - name: Configure (CMake)
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-elf.cmake

      - name: Build kernel.elf
        run: cmake --build build --target kernel.elf -j"$(nproc)"

      - name: Build chaseros.iso
        run: cmake --build build --target chaseros_iso -j"$(nproc)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chaseros-build-${{ github.sha }}
          path: |
            build/kernel.elf
            build/chaseros.iso
          if-no-files-found: error
